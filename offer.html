<!DOCTYPE html>
<html lang="en" data-page="offer">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BookZone – Special Offers</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/lexi.css" />
  </head>

  <body data-page="offer">
    <nav class="navbar navbar-expand-lg navbar-dark px-3 sticky-top">
      <div
        class="container-fluid d-flex align-items-center px-4"
        style="height: 75px"
      >
        <a
          class="navbar-brand d-flex align-items-center gap-2"
          href="index.html"
        >
          <i class="ri-book-open-fill fs-3 text-primary"></i
          ><span class="fw-bold text-white">BookZone</span>
        </a>
        <div class="ms-auto d-flex gap-3 align-items-center">
          <div
            class="spinner-border spinner-border-sm text-light opacity-25"
            role="status"
          ></div>
        </div>
      </div>
    </nav>

    <div id="toastContainer"></div>

    <!-- ✅ HERO PLACEHOLDER -->
    <header class="page-header"></header>

    <section class="container py-4">

      <div class="row g-4" id="offerBooksContainer"></div>
    </section>

    <div class="modal fade" id="globalPopup" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div
          class="modal-content border-0 shadow-lg rounded-4 overflow-hidden"
        >
          <div class="modal-header border-0 pb-0">
            <h5 class="modal-title fw-bold" id="popupTitle"></h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body text-muted py-4" id="popupMessage"></div>
          <div class="modal-footer border-0 pt-0">
            <div id="popupActions" class="w-100 d-grid gap-2"></div>
          </div>
        </div>
      </div>
    </div>

    <footer></footer>
<div id="lexi-root">
  <div id="lexi-overlay"></div>

  <button id="lexi-bubble" aria-label="Open Lexi">
    💬
  </button>

  <aside id="lexi-sidebar">
    <div class="lexi-header d-flex justify-content-between align-items-center">
      <div class="d-flex align-items-center gap-2">
        <i class="ri-robot-2-line fs-5"></i>
        <span class="fw-bold">Lexi Assistant</span>
      </div>
      <div class="lexi-header-actions d-flex align-items-center gap-2">
        <button id="lexi-clear" title="Clear Conversation" class="btn btn-link p-0 text-white opacity-75 hover-opacity-100">
          <i class="ri-delete-bin-line"></i>
        </button>
        <button id="lexi-close" title="Close Assistant" class="btn btn-link p-0 text-white">✕</button>
      </div>
    </div>

    <div id="lexi-messages"></div>

    <div class="lexi-input">
      <input
        type="text"
        id="lexi-input"
        placeholder="Ask me for a book or a deal..."
        autocomplete="off"
      />
      <button id="lexi-send" title="Send Message">➤</button>
    </div>
  </aside>
</div>
    <button id="backToTop">
      <i class="ri-arrow-up-line"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/bookstore.js"></script>
    <script src="assets/js/login.js"></script>
    <script src="assets/js/cart.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/lexi.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const notice = document.getElementById("offerNotice");
        const container = document.getElementById("offerBooksContainer");
        const bs = window.Bookstore;

        if (!bs || !container) return;

        const offer =
          JSON.parse(localStorage.getItem("bookzone_offer")) || {
            active: false,
            discount: 3,
            festival: null,
          };

        const discount = offer.active ? offer.discount : 3;

        if (notice) {
          notice.classList.remove("d-none");
          notice.innerHTML = offer.active
            ? `<strong>${offer.festival || "Festival Offer"}:</strong> Enjoy <strong>${discount}% OFF</strong> on selected titles.`
            : `<strong>Premium Member Discount:</strong> Flat <strong>3% OFF</strong> available by default.`;
        }

        const books = bs.getOfferBooks();

        if (books.length === 0) {
          container.innerHTML = `
            <div class="col-12 text-center py-5">
              <p class="text-muted mb-3">
                No discounted books available right now.
              </p>
              <a href="index.html" class="btn btn-primary rounded-pill px-4">
                Continue Browsing
              </a>
            </div>`;
          return;
        }

        container.innerHTML = books
          .map((b) => UI.createBookCard(b))
          .join("");
      });
    </script>
  </body>
</html>
