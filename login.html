<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login — BookZone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/styles.css" />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }

      .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .auth-card {
        width: 100%;
        max-width: 420px;
        border-radius: 14px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>

  <body data-page="login">

    <nav class="navbar navbar-dark px-3">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="ri-book-open-fill fs-4"></i>
        <span class="fw-semibold">BookZone</span>
      </a>

      <button id="themeToggle" class="btn btn-outline-light btn-sm">
        <i id="themeIcon" class="ri-moon-line"></i>
      </button>
    </nav>

    <div class="auth-wrapper px-3">
      <div class="card auth-card border-0 p-4">
        <h3 class="fw-bold text-center mb-1">Sign In</h3>
        <p class="text-muted text-center mb-4">
          Welcome back! Please login to continue.
        </p>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            id="loginEmail"
            type="email"
            class="form-control"
            placeholder="example@gmail.com"
            name="login-email"
            autocomplete="username"
            autocapitalize="none"
            autocorrect="off"
            spellcheck="false"
          />
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            id="loginPassword"
            type="password"
            class="form-control"
            placeholder="Enter password"
            name="login-password"
            autocomplete="current-password"
          />
        </div>

        <button
          id="loginBtn"
          class="btn btn-primary w-100 py-2 fw-semibold mb-3"
        >
          Login
        </button>

        <div class="text-center text-muted small mb-3">or</div>

        <div id="googleLoginBtn" class="w-100 mb-3"></div>

        <div class="text-center small">
          Don’t have an account?
          <a href="register.html" class="fw-semibold">Create Account</a>
        </div>

        <div class="text-center small mt-2">
          <a href="reset-password.html">Forgot Password?</a>
        </div>
      </div>
    </div>

    <div id="toastContainer"></div>

    <div class="modal fade" id="globalPopup" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
          <div class="modal-header">
            <h5 class="modal-title" id="popupTitle"></h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body" id="popupMessage"></div>
          <div class="modal-footer" id="popupActions"></div>
        </div>
      </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="assets/js/ui.js"></script>
    <script src="assets/js/login.js"></script>
    
    <script src="assets/js/cart.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            if (window.UI) {
                UI.syncNavbar();
                UI.updateCartCount();
            }
        });
    </script>
  </body>
</html>
