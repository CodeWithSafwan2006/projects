<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Reset Password — BookZone</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="assets/css/styles.css" />

    <style>
      body {
        font-family: Inter, sans-serif;
      }
      .auth-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .auth-card {
        max-width: 450px;
        width: 100%;
        border-radius: 14px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-dark px-3">
      <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
        <i class="ri-book-open-fill fs-4"></i>
        <span class="fw-semibold">BookZone</span>
      </a>
    </nav>

    <div class="auth-wrapper px-3">
      <div class="card auth-card p-4 border-0">
        <h3 class="fw-bold text-center mb-2">Reset Password</h3>
        <p class="text-muted text-center mb-4">
          Verify your details to reset your password
        </p>

       <div class="mb-3">
  <label class="form-label">Full Name</label>
  <input
    id="resetFullName"
    class="form-control"
    placeholder="Full name"
    name="reset-full-name"
    autocomplete="name"
    autocapitalize="words"
    spellcheck="false"
  />
</div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            id="resetEmail"
            type="email"
            class="form-control"
            placeholder="Email"
            name="reset-email"
            autocomplete="username"
            autocapitalize="none"
            autocorrect="off"
            spellcheck="false"
          />
        </div>

        <hr class="my-4" />

       <div class="mb-3">
  <label class="form-label">New Password</label>

  <input
    type="password"
    id="resetPassword"
    class="form-control"
    placeholder="New password"
    autocomplete="new-password"
  />

  <!-- Password requirement line -->
  <div id="resetPasswordHint" class="password-requirement">
    <b>8–15 chars • Uppercase • Lowercase • Special character</b>
  </div>
</div>


        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input
            id="resetConfirmPassword"
            type="password"
            class="form-control"
            name="reset-confirm-password"
            autocomplete="new-password"
          />
        </div>

        <button id="resetBtn" class="btn btn-primary w-100 py-2">
          Reset Password
        </button>

        <div class="modal fade" id="globalPopup" tabindex="-1">
          <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow">
              <div class="modal-header">
                <h5 class="modal-title" id="popupTitle"></h5>
                <button
                  type="button"
                  class="btn-close"
                  data-bs-dismiss="modal"
                ></button>
              </div>
              <div class="modal-body" id="popupMessage"></div>
              <div class="modal-footer" id="popupActions"></div>
            </div>
          </div>
        </div>

        <div class="text-center mt-3">
          <a href="login.html">Back to Login</a>
        </div>
      </div>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="assets/js/ui.js"></script>
    <script src="assets/js/reset-password.js"></script>
    <script src="assets/js/cart.js"></script>
  </body>
</html>
